services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: setu
      MYSQL_DATABASE: setu
      MYSQL_USER: setu
      MYSQL_PASSWORD: setu
    ports:
      - "3307:3306"   # 3307 on the host to avoid colliding with a local MySQL
    command:
      # Store and interpret everything as UTC. The app already normalises inbound
      # timestamps to UTC (DATETIME(6) has no timezone awareness — see
      # sql/schema.sql), so pinning the server removes the last place a stray
      # local timezone could reinterpret a value.
      - --default-time-zone=+00:00
    healthcheck:
      # The api service waits on this, so it can never start against a MySQL that
      # is up but not yet accepting connections. MySQL's entrypoint starts a
      # temporary server for initialisation, so a naive port check would pass too
      # early — this authenticates properly instead.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "setu", "-psetu"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - mysqldata:/var/lib/mysql

  api:
    build: .
    environment:
      DATABASE_URL: mysql+pymysql://setu:setu@db:3306/setu
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Load the sample data, then serve. The loader is idempotent, so a container
    # restart re-reports every event as a duplicate and changes nothing.
    command: >
      sh -c "python -m scripts.load_sample_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  mysqldata:
